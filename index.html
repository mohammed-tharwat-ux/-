<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد أضحى مبارك - م. محمد ثروت</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;700;900&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* إعدادات عامة */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            overflow: hidden;
            background-color: #020813;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ----------------------------------
           1. شاشة البداية 
           ---------------------------------- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 8, 19, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.5s ease;
        }
        .start-btn {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            color: white; border: none;
            padding: 15px 40px; font-size: clamp(1.2rem, 4vw, 1.5rem);
            border-radius: 50px; cursor: pointer;
            font-family: 'Cairo', sans-serif; font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 87, 34, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 87, 34, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 87, 34, 0); }
        }

        /* ----------------------------------
           2. مشهد الاحتفال والتوافق مع الشاشات
           ---------------------------------- */
        #scene-farm {
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            transition: opacity 1.5s ease, transform 1.5s ease;
            z-index: 10; overflow: hidden;
        }
        
        .bg-video {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; object-position: center center;
            z-index: 1; transition: opacity 2s ease-in-out; 
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;}
        
        /* تصميم نصوص العيد (للظهور التدريجي) */
        .eid-text-container {
            position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 5;
            width: 100%;
        }
        .text-part {
            font-family: 'Aref Ruqaa', serif; /* خط إسلامي هجري */
            opacity: 0; 
            transform: translateY(20px) scale(0.8);
            transition: all 1.5s ease-out;
            text-shadow: 0 0 15px #ffeb3b, 0 0 30px #ff9800;
        }
        #text-part-1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #fff;
            margin-bottom: 10px;
        }
        #text-part-2 {
            font-size: clamp(3rem, 8vw, 6rem);
            color: #ffeb3b;
        }
        .text-part.show { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
        }

        .real-sheep {
            position: absolute; z-index: 3;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6));
        }
        #sheep-1 { bottom: 5vh; left: -20vw; width: clamp(90px, 15vw, 180px); animation: realisticWalkRight 20s infinite linear; }
        #sheep-2 { bottom: 2vh; left: -35vw; width: clamp(60px, 10vw, 120px); animation: realisticWalkRight 20s infinite linear; animation-delay: 1.5s; }

        @keyframes realisticWalkRight {
            0% { left: -20vw; transform: translateY(0); }
            10% { left: 15vw; transform: translateY(-3px); }
            20% { left: 35vw; transform: translateY(0); }
            22% { left: 35vw; transform: rotate(15deg) translateY(5px); } 
            35% { left: 35vw; transform: rotate(15deg) translateY(5px); } 
            38% { left: 35vw; transform: rotate(0) translateY(0); }
            50% { left: 65vw; transform: translateY(-3px); }
            52% { left: 65vw; transform: rotate(15deg) translateY(5px); } 
            65% { left: 65vw; transform: rotate(15deg) translateY(5px); }
            68% { left: 65vw; transform: rotate(0) translateY(0); }
            100% { left: 120vw; transform: translateY(0); } 
        }

        /* ----------------------------------
           3. مشهد بطاقة المهندس (البروفايل الأخير)
           ---------------------------------- */
        #scene-profile {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 20; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
            background: radial-gradient(circle at center, #1a2a6c, #112 80%);
        }
        #scene-profile.active { opacity: 1; pointer-events: auto; }
        
        /* مكان اللوجو أعلى اليمين */
        .brand-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: clamp(60px, 15vw, 100px);
            height: auto;
            z-index: 30;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(50px); transition: transform 1.5s ease;
            animation: floatCard 4s ease-in-out infinite;
            width: 90%; max-width: 450px; 
        }
        #scene-profile.active .profile-card { transform: translateY(0); }
        
        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .profile-img-wrapper {
            width: clamp(100px, 35vw, 150px); 
            height: clamp(100px, 35vw, 150px); 
            margin: 0 auto 15px;
            border-radius: 50%; padding: 5px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 3px solid #112; object-position: top;
        }
        .profile-name {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 600;
            background: linear-gradient(to right, #ffffff, #a8c0ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* نص التهنئة في الصفحة الأخيرة */
        .greeting-message {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            color: #d1d5db;
            line-height: 1.6;
            margin-top: 20px;
            padding: 0 10px;
        }

        /* أيقونات السوشيال ميديا */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .social-icons a {
            color: #fff;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .social-icons a:hover {
            transform: translateY(-5px);
            background: #fff;
        }
        /* ألوان الأيقونات عند الوقوف عليها */
        .social-icons a.fb:hover { color: #1877F2; }
        .social-icons a.wa:hover { color: #25D366; }
        .social-icons a.ig:hover { color: #E4405F; }
        .social-icons a.tk:hover { color: #000000; }

    </style>
</head>
<body>

    <audio id="bg-music" src="https://server12.mp3quran.net/Eid/Eid_Takbeerat.mp3" loop></audio>

    <div id="start-screen">
        <button class="start-btn" onclick="startCelebration()">إضغط لتبدأ الاحتفال 🎉</button>
    </div>

    <div id="scene-farm">
        <video id="vid1" class="bg-video" loop playsinline>
            <source src="https://res.cloudinary.com/dzn8j3ox4/video/upload/snaptik_7640947409631137045_v3_p25u3l.mp4" type="video/mp4">
        </video>
        <video id="vid2" class="bg-video" loop playsinline style="opacity: 0;">
            <source src="https://res.cloudinary.com/dzn8j3ox4/video/upload/snaptik_7511700954060688658_v3_hdhnur.mp4" type="video/mp4">
        </video>

        <canvas id="fireworks"></canvas>
        
        <div class="eid-text-container">
            <div id="text-part-1" class="text-part">كل عام وأنتم بخير</div>
            <div id="text-part-2" class="text-part">عيد أضحى مبارك 2026</div>
        </div>
    </div>

    <div id="scene-profile">
        <img src="https://i.ibb.co/v6nfLPTF/Picture1.png" alt="Logo" class="brand-logo">

        <div class="profile-card">
            <div class="profile-img-wrapper">
                <img src="https://i.ibb.co/WW9pQ3Z3/profile.jpg" alt="Eng. Mohammed Tharwat" class="profile-img">
            </div>
            <h2 class="profile-name">Eng. Mohammed Tharwat</h2>
            
            <p class="greeting-message">
                أهنئكم بقدوم عيد الأضحى المبارك وأدعو الله أن يملأ قلوبكم بالسكينة وبيوتكم بالفرح وأعمالكم بالقبول، وأن يجعل أيامكم كلها أعياداً وسعادة.
            </p>

            <div class="social-icons">
                <a href="https://www.facebook.com/share/1Lg7wMS8Xx/?mibextid=wwXIfr" target="_blank" class="fb" title="فيسبوك"><i class="fab fa-facebook-f"></i></a>
                <a href="https://wa.me/qr/V5PCIYDCHWO2P1" target="_blank" class="wa" title="واتساب"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.instagram.com/mohamad_tharwet?igsh=aHlhdXpodmlpNXRp&utm_source=qr" target="_blank" class="ig" title="إنستجرام"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@mohamad_tharwet?_r=1&_t=ZS-96bPIn9DK6y" target="_blank" class="tk" title="تيك توك"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [], fireworks = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.sx = Math.random() * 3 - 1.5;
                this.sy = Math.random() * -3 - 6; 
                this.size = 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.shouldExplode = false;
            }
            update() {
                this.x += this.sx;
                this.y += this.sy;
                if (this.sy >= -1 || this.y <= canvas.height * 0.3) {
                    this.shouldExplode = true;
                    explode(this.x, this.y, this.color);
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.sx = Math.random() * 8 - 4;
                this.sy = Math.random() * 8 - 4;
                this.size = Math.random() * 2 + 1;
                this.color = color;
                this.alpha = 1;
            }
            update() {
                this.x += this.sx;
                this.y += this.sy;
                this.sy += 0.05; 
                this.alpha -= 0.01; 
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function explode(x, y, color) {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        let animationId;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.05) fireworks.push(new Firework());

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].shouldExplode) fireworks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            animationId = requestAnimationFrame(animate);
        }

        function startCelebration() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 500);

            const audio = document.getElementById('bg-music');
            audio.volume = 0.2; 
            audio.play().catch(e => console.log("خطأ في الصوت"));

            const vid1 = document.getElementById('vid1');
            const vid2 = document.getElementById('vid2');
            vid1.play();
            animate();

            // ظهور النص الأول (كل عام وأنتم بخير) بعد ثانية ونص
            setTimeout(() => {
                document.getElementById('text-part-1').classList.add('show');
            }, 1500);

            // ظهور النص الثاني (عيد أضحى مبارك) بعد 3 ثواني
            setTimeout(() => {
                document.getElementById('text-part-2').classList.add('show');
            }, 3000);

            // الانتقال للفيديو الثاني
            setTimeout(() => {
                vid1.style.opacity = '0'; 
                vid2.play(); 
                vid2.style.opacity = '1'; 
                
                setTimeout(() => { vid1.pause(); }, 2000);
            }, 7000); 

            // الانتقال لصفحة المهندس
            setTimeout(() => {
                document.getElementById('scene-farm').style.opacity = '0';
                document.getElementById('scene-farm').style.transform = 'scale(1.2)';
                
                setTimeout(() => {
                    vid2.pause(); 
                    cancelAnimationFrame(animationId); 
                    document.getElementById('scene-profile').classList.add('active');
                }, 1500);
                
            }, 16000); 
        }
    </script>
</body>
</html>
